<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>影视大厅</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  position:relative;
  background:#0a0a0a;
}

/* 入口页样式 */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  animation:bgSlide 18s infinite ease-in-out;
  filter:brightness(0.6);
}
@keyframes bgSlide{
  0%{background-image:url('https://picsum.photos/id/1039/1920/1080');}
  33%{background-image:url('https://picsum.photos/id/1046/1920/1080');}
  66%{background-image:url('https://picsum.photos/id/1074/1920/1080');}
  100%{background-image:url('https://picsum.photos/id/1039/1920/1080');}
}
.mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
}
.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:2;
  width:90%;
  max-width:400px;
  background:rgba(20,20,20,0.85);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:40px 30px;
  text-align:center;
  color:#fff;
}
.card h1{
  font-size:42px;
  margin-bottom:12px;
  font-weight:700;
}
.card p{
  font-size:16px;
  color:#ccc;
  margin-bottom:30px;
}
.btn-group{
  display:flex;
  flex-direction:column;
  gap:15px;
}
.btn{
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  transition:transform 0.2s;
}
.btn:hover{
  transform:scale(1.02);
}
.btn-main{
  background:#e50914;
  color:#fff;
}
.btn-second{
  background:rgba(255,255,255,0.1);
  color:#fff;
  border:1px solid rgba(255,255,255,0.2);
}

/* 影视大厅样式 */
.hero{
  position:relative;
  height:50vh;
  background-size:cover;
  background-position:center;
  display:grid;
  place-items:center;
  text-align:center;
  padding:20px;
}
.hero::before{
  content:'';
  position:absolute;inset:0;
  background:rgba(0,0,0,0.75);
}
.hero .content{
  position:relative;z-index:1;
  max-width:600px;
  width:100%;
}
.hero h1{
  font-size:32px;
  margin-bottom:12px;
}
.search{
  width:100%;
  padding:14px 18px;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:16px;
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter:blur(8px);
}
.tabs{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:20px 0;
  padding:0 20px;
}
.tab{
  padding:10px 16px;
  background:rgba(255,255,255,0.1);
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:15px;
  cursor:pointer;
}
.tab.active{
  background:#e50914;
}
.container{
  padding:0 20px 40px;
  max-width:1000px;
  margin:0 auto;
}
.movies{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:16px;
}
.movie{
  border-radius:12px;
  overflow:hidden;
  background:#111;
  cursor:pointer;
  transition:transform 0.2s;
}
.movie:hover{
  transform:scale(1.04);
}
.movie img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
}
.movie .info{
  padding:10px;
}
.movie .title{
  font-size:14px;
  white-space:nowrap;
  overflow:hidden;
}
.movie .rate{
  font-size:12px;
  color:#ffcc00;
  margin-top:4px;
}
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  z-index:999;
  padding:20px;
  align-items:center;
  justify-content:center;
}
.modal.show{
  display:flex;
}
.modal-content{
  background:#111;
  max-width:400px;
  border-radius:16px;
  overflow:hidden;
  position:relative;
}
.modal-content img{
  width:100%;
}
.modal-info{
  padding:20px;
}
.modal-title{
  font-size:20px;
  margin-bottom:8px;
}
.modal-desc{
  font-size:14px;
  color:#ccc;
  line-height:1.5;
  max-height:120px;
  overflow-y:auto;
}
.close{
  position:absolute;
  top:14px;right:14px;
  background:rgba(0,0,0,0.5);
  color:#fff;
  border:none;
  width:36px;height:36px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>
<body>
<!-- 入口页 -->
<div id="entrance">
  <div class="bg"></div>
  <div class="mask"></div>
  <div class="card">
    <h1>影视大厅</h1>
    <p>高清影视 | 流畅播放 | 每日更新</p >
    <div class="btn-group">
      <button class="btn btn-main" onclick="enterHall()">立即进入</button>
      <button class="btn btn-second" onclick="bookmark()">收藏本站</button>
    </div>
  </div>
</div>

<!-- 影视大厅（默认隐藏） -->
<div id="hall" style="display:none;">
  <div class="hero" id="hero">
    <div class="content">
      <h1>🎬 影视大厅</h1>
      <input class="search" id="search" placeholder="搜索电影、剧集、动漫…">
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-type="movie">电影</button>
    <button class="tab" data-type="tv">剧集</button>
    <button class="tab" data-type="multi">全网搜索</button>
  </div>
  <div class="container">
    <div class="movies" id="movies"></div>
  </div>
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="close" onclick="closeModal()">×</button>
      < img id="modal-img">
      <div class="modal-info">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-desc" id="modal-desc"></div>
      </div>
    </div>
  </div>
</div>

<script>
const TMDB_KEY = "972043728784c3b1822f29ae468e5fba";
const IMG = "https://image.tmdb.org/t/p/w500";

// 入口页 → 影视大厅
function enterHall() {
  document.getElementById("entrance").style.display = "none";
  document.getElementById("hall").style.display = "block";
  document.body.style.overflow = "auto";
  loadList();
}

// 收藏提示
function bookmark() {
  alert("请按浏览器菜单 → 加入书签/收藏本站");
}

// TMDB 影视功能
const hero = document.getElementById("hero");
const moviesEl = document.getElementById("movies");
const searchInput = document.getElementById("search");
let currentType = "movie";

document.querySelectorAll(".tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentType = tab.dataset.type;
    loadList(currentType);
  };
});

searchInput.oninput = () => {
  const q = searchInput.value.trim();
  if(q.length >= 2) search(q);
  else if(q === "") loadList(currentType);
};

async function loadList(type = "movie"){
  moviesEl.innerHTML = "加载中...";
  const res = await fetch(`https://api.themoviedb.org/3/${type}/popular?api_key=${TMDB_KEY}&language=zh-CN`);
  const data = await res.json();
  render(data.results);
}

async function search(q){
  moviesEl.innerHTML = "搜索中...";
  const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=zh-CN`);
  const data = await res.json();
  render(data.results);
}

function render(list){
  moviesEl.innerHTML = "";
  if(list.length === 0){
    moviesEl.innerHTML = "暂无结果";
    return;
  }
  if(list[0]?.backdrop_path){
    hero.style.backgroundImage = `url(${IMG}${list[0].backdrop_path})`;
  }
  list.slice(0,12).forEach(item => {
    const title = item.title || item.name;
    const poster = item.poster_path ? IMG+item.poster_path : "https://picsum.photos/300/450";
    const rate = item.vote_average?.toFixed(1) || "0";
    const el = document.createElement("div");
    el.className = "movie";
    el.innerHTML = `
      < img src="${poster}" alt="">
      <div class="info">
        <div class="title">${title}</div>
        <div class="rate">⭐ ${rate}</div>
      </div>
    `;
    el.onclick = () => openModal(item);
    moviesEl.appendChild(el);
  });
}

function openModal(item){
  document.getElementById("modal-title").innerText = item.title || item.name;
  document.getElementById("modal-desc").innerText = item.overview || "暂无简介";
  document.getElementById("modal-img").src = item.backdrop_path ? IMG+item.backdrop_path : IMG+item.poster_path;
  document.getElementById("modal").classList.add("show");
}
function closeModal(){
  document.getElementById("modal").classList.remove("show");
}
</script>
</body>
</html>
