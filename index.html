<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MakkaPakka's Widgets</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 动态背景轮播 */
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .bg-slideshow {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .bg-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: fade 18s infinite;
    }
    .bg-slide:nth-child(1) { animation-delay: 0s; }
    .bg-slide:nth-child(2) { animation-delay: 6s; }
    .bg-slide:nth-child(3) { animation-delay: 12s; }

    @keyframes fade {
      0% { opacity: 0; }
      16.666% { opacity: 1; }
      33.333% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* 半透明黑色遮罩，让文字更清晰 */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1;
    }

    /* 顶部标题区域 */
    .header {
      position: relative;
      z-index: 2;
      text-align: center;
      padding-top: 60px;
      color: white;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid white;
      margin-bottom: 16px;
      object-fit: cover;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 16px;
      opacity: 0.9;
    }

    /* 居中弹窗（VOD播放源） */
    .modal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      width: 90%;
      max-width: 400px;
      background: #6c2bd9;
      border-radius: 16px;
      padding: 32px 24px;
      color: white;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .modal-icon svg {
      width: 24px;
      height: 24px;
      fill: white;
    }
    .modal-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .modal-desc {
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.9;
      margin-bottom: 24px;
    }
    .modal-version {
      display: inline-block;
      font-size: 12px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
      margin-bottom: 20px;
    }
    .modal-btn {
      width: 100%;
      padding: 14px;
      background: white;
      color: #6c2bd9;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    /* 底部按钮栏 */
    .footer {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: 90%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .footer-row {
      display: flex;
      gap: 10px;
    }
    .footer-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .footer-btn.primary {
      background: #2563eb;
      color: white;
    }
    .footer-btn.secondary {
      background: rgba(0,0,0,0.5);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .footer-btn.full {
      background: #6c2bd9;
      color: white;
    }
    .footer-btn:hover {
      opacity: 0.9;
    }

    /* 版权信息 */
    .copyright {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      z-index: 2;
    }
  </style>
</head>
<body>
  <!-- 动态背景轮播 -->
  <div class="bg-slideshow">
    <div class="bg-slide" style="background-image: url('https://picsum.photos/id/1/1920/1080')"></div>
    <div class="bg-slide" style="background-image: url('https://picsum.photos/id/237/1920/1080')"></div>
    <div class="bg-slide" style="background-image: url('https://picsum.photos/id/1005/1920/1080')"></div>
  </div>

  <!-- 半透明遮罩 -->
  <div class="overlay"></div>

  <!-- 顶部标题 -->
  <div class="header">
    <img class="avatar" src="https://picsum.photos/id/237/200/200" alt="Avatar" />
    <h1 class="title">MakkaPakka's Widgets</h1>
    <p class="subtitle">左右滑动选择组件</p>
  </div>

  <!-- 居中弹窗 -->
  <div class="modal">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24">
        <path d="M18 4l2 4h-3l-2-4h-2l2 4H7L9 4H7l-2 4H1v2h22V8h-2l2-4h-2l-2 4h-3l2-4h-2zM2 18v2h12v-2H2zm14 0v2h8v-2h-8z"/>
      </svg>
    </div>
    <h2 class="modal-title">VOD 播放源</h2>
    <p class="modal-desc">获取VOD播放资源（合集没有该模块，需要单独添加！！！）</p>
    <div class="modal-version">v1.0.3</div>
    <button class="modal-btn">+ 添加</button>
  </div>

  <!-- 底部按钮栏 -->
  <div class="footer">
    <div class="footer-row">
      <button class="footer-btn secondary">
        🔘 导入我的首页
      </button>
      <button class="footer-btn primary">
        📚 导入全部模块
      </button>
    </div>
    <button class="footer-btn full">
      🎬 找点剧看吧
    </button>
  </div>

  <!-- 版权信息 -->
  <div class="copyright">
    © 2026 MakkaPakka · Forward | 联系作者
  </div>
</body>
</html>
