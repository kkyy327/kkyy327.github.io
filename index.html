<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>影视大厅</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body{
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* 背景轮播 */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  animation:bgMove 21s infinite linear;
  filter:brightness(0.5);
}
@keyframes bgMove{
  0%{background-image:url(https://picsum.photos/id/1039/1920/1080);}
  33%{background-image:url(https://picsum.photos/id/1046/1920/1080);}
  66%{background-image:url(https://picsum.photos/id/1074/1920/1080);}
  100%{background-image:url(https://picsum.photos/id/1039/1920/1080);}
}

/* 磨砂玻璃卡片 */
.container{
  position:relative;
  z-index:2;
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.card{
  background:rgba(20,20,20,0.7);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:40px 30px;
  max-width:380px;
  width:100%;
  color:#fff;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.card h1{
  font-size:30px;
  margin-bottom:10px;
  color:#f5f5f5;
}
.card p{
  font-size:15px;
  color:#ccc;
  margin-bottom:30px;
  line-height:1.5;
}

/* 按钮 */
.btn-group{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.btn{
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  transition:0.2s;
}
.btn-main{
  background:#e50914;
  color:#fff;
}
.btn-second{
  background:rgba(255,255,255,0.1);
  color:#fff;
  border:1px solid rgba(255,255,255,0.2);
}
.btn:hover{
  transform:scale(1.03);
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="container">
  <div class="card">
    <h1>影视大厅</h1>
    <p>高清影视 | 流畅播放 | 每日更新</p >
    <div class="btn-group">
      <button class="btn btn-main">立即进入</button>
      <button class="btn btn-second">收藏本站</button>
    </div>
  </div>
</div>
</body>
</html>
